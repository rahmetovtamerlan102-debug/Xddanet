services:
  - type: web
    name: Odaprodiv
    runtime: python
    runtimeVersion: "3.12"
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_URL
        sync: false
